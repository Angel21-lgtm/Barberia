<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbería Tema</title>
    <!-- ESTILOS -->
    <!-- Librería -->
    <link rel="stylesheet" href="./style/librerías/display.css">
    <link rel="stylesheet" href="./style/librerías/flex-box.css">
    <link rel="stylesheet" href="./style/librerías/grid.css">
    <link rel="stylesheet" href="./style/librerías/position.css">
    <!-- Generales -->
    <link rel="stylesheet" href="./style/generales/animaciones.css">
    <link rel="stylesheet" href="./style/generales/fonts.css">
    <link rel="stylesheet" href="./style/generales/reciclados.css">
    <link rel="stylesheet" href="./style/generales/responsive.css">
    <link rel="stylesheet" href="./style/generales/universal.css">
    <!-- Secciones -->
    <link rel="stylesheet" href="./style/secciones/01-inicio.css">
</head>

<body>
    <!------------------------------------------------------------------------------------------------------------------------------------>
    <!-- SECCIÓN HEADER (CABECERA) -->
    <header id="inicio" class="contenedor-de-secciones display-flex">
        <!-- Botón del menú desplegable -->
        <button id="boton-menu-desplegable"
            class="boton-2 position-fixed display-none align-items-center justify-content-center">
            &#9776;
        </button>
        <!-- Botón del menú desplegable -->

        <!-- Navegación de secciones -->
        <nav class="display-flex flex-direction-column position-fixed">
            <!-- Logotipo -->
            <div>
                <img src="./img/iconos/logotipo/logotipo-blanco.png" alt="Logotipo">
            </div>
            <!-- Logotipo -->

            <!-- Lista de navegación-->
            <ul
                class="ul-navegador-de-secciones display-flex flex-direction-column justify-content-space-evenly align-items-center flex-1">
                <li
                    class="lista-links-nav flex-1 display-flex align-items-center justify-content-center position-relative seccion-actual">
                    <a class="position-relative display-inline-block" title="Sección principal." href="#inicio">
                        INICIO
                    </a>
                </li>

                <li
                    class="lista-links-nav flex-1 display-flex align-items-center justify-content-center position-relative">
                    <a class="position-relative display-inline-block" title="Descripción de nosotros."
                        href="#sobre-nosotros">
                        SOBRE NOSOTROS
                    </a>
                </li>

                <li
                    class="lista-links-nav flex-1 display-flex align-items-center justify-content-center position-relative">
                    <a class="position-relative display-inline-block" title="Servicios que ofrecemos (catálogo)."
                        href="#servicios">
                        SERVICIOS
                    </a>
                </li>

                <li
                    class="lista-links-nav flex-1 display-flex align-items-center justify-content-center position-relative">
                    <a class="position-relative display-inline-block" title="Nuestro trabajo." href="#portafolio">
                        PORTAFOLIO
                    </a>
                </li>

                <li class="flex-1 display-flex align-items-center justify-content-center">
                    <a class="position-relative display-inline-block tienda"
                        title="Grandes ofertas de productos para ustedes." href="./tienda.html" target="_blank">
                        TIENDA
                    </a>
                </li>

                <li
                    class="lista-links-nav flex-1 display-flex align-items-center justify-content-center position-relative">
                    <a class="position-relative display-inline-block" title="Contáctanos." href="#contacto">
                        CONTACTO
                    </a>
                </li>
            </ul>
            <!-- Lista de navegación-->

            <!-- Lista de redes sociales -->
            <ul
                class="ul-navegador-de-redes-sociales display-flex flex-direction-column justify-content-space-evenly align-items-center flex-0">
                <li class="flex-1">
                    <a title="¡Visítanos en Facebook!" href="#">
                        <img src="./img/iconos/redes-sociales/facebook-naranja.png" alt="Facebook.">
                    </a>
                </li>
                <li class="flex-1">
                    <a title="¡Visítanos en Instagram!" href="#">
                        <img src="./img/iconos/redes-sociales/instagram-naranja.png" alt="Instagram.">
                    </a>
                </li>
                <li class="flex-1">
                    <a title="Visítanos en TikTok!" href="#">
                        <img src="./img/iconos/redes-sociales/tiktok-naranja.png" alt="TikTok.">
                    </a>
                </li>
            </ul>
            <!-- Lista de redes sociales -->
        </nav>
        <!-- Navegación de secciones -->

        <!-- Sección de la cabecera de la web (inicio) -->
        <section class="seccion-contenedora-principal display-grid grid-columns-minmax-250px-1fr position-relative">
            <!-- Título, logotipo y botones de WhatsApp -->
            <article class="display-grid">
                <!-- Logotipo y título -->
                <div>
                    <img src="./img/iconos/logotipo/logotipo-blanco.png" alt="Logotipo de la barbería.">
                </div>

                <h1 class="display-flex align-items-center justify-content-center">
                    BARBERÍA
                </h1>
                <!-- Logotipo y título -->

                <!-- Promociones -->
                <h3 class="display-flex align-items-center justify-content-center">
                    PROMOCIONES
                    <span></span>
                </h3>

                <ul id="contenedor-promociones" class="display-flex justify-content-space-evenly align-items-center">
                    <!-- Contenido de las promociones -->
                </ul>

                <div class="contenedor-button-header display-flex align-items-center justify-content-center">
                    <button class="boton-1 position-relative">
                        Agendar cita
                    </button>
                </div>
                <!-- Promociones -->
            </article>
            <!-- Título, logotipo y botones de WhatsApp -->

            <!-- Fotografía del dueño de la barbería -->
            <div class="position-relative">
                <img src="./img/secciones/inicio/barbero.png" alt="Fotografía del barbero.">
            </div>
            <!-- Fotografía del dueño de la barbería -->
        </section>
        <!-- Sección de la cabecera de la web (inicio) -->
    </header>
    <!-- SECCIÓN HEADER (CABECERA) -->
    <!------------------------------------------------------------------------------------------------------------------------------------>

    <!------------------------------------------------------------------------------------------------------------------------------------>
    <!-- SECCIÓN SOBRE NUESTRA DESCRIPCIÓN (Sobre nosotros) -->
    <section id="sobre-nosotros" class="contenedor-de-secciones">
    </section>
    <!-- SECCIÓN SOBRE NUESTRA DESCRIPCIÓN (Sobre nosotros) -->
    <!------------------------------------------------------------------------------------------------------------------------------------>

    <!------------------------------------------------------------------------------------------------------------------------------------>
    <!-- SECCIÓN PRINCIPAL MAIN SOBRE SERVICIOS OFRECIDOS -->
    <main id="servicios" class="contenedor-de-secciones">
    </main>
    <!-- SECCIÓN PRINCIPAL MAIN SOBRE SERVICIOS OFRECIDOS -->
    <!------------------------------------------------------------------------------------------------------------------------------------>

    <section id="portafolio" class="contenedor-de-secciones">
    </section>

    <footer id="contacto" class="contenedor-de-secciones">
    </footer>

    <!------------------------------------------------------------------------------------------------------------------------------------>
    <!-- SCRIPT MODULE DE JAVASCRIPT -->
    <script type="module" src="./script/main.js"></script>
    <!-- SCRIPT MODULE DE JAVASCRIPT -->
    <!------------------------------------------------------------------------------------------------------------------------------------>
</body>

</html>
